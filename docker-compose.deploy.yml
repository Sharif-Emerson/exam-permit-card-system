services:
  backend:
    build:
      context: ./examples/rest-backend
      dockerfile: Dockerfile
    init: true
    environment:
      PORT: ${PORT:-4000}
      APP_DB_PATH: ${APP_DB_PATH:-/app/data/production.sqlite}
      SESSION_TTL_HOURS: ${SESSION_TTL_HOURS:-12}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-}
      BOOTSTRAP_ADMIN_NAME: ${BOOTSTRAP_ADMIN_NAME:-}
      BOOTSTRAP_ADMIN_PHONE: ${BOOTSTRAP_ADMIN_PHONE:-}
      BOOTSTRAP_ADMIN_SCOPE: ${BOOTSTRAP_ADMIN_SCOPE:-super-admin}
    restart: unless-stopped
    stop_grace_period: 20s
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:' + (process.env.PORT || '4000') + '/health').then((response) => { if (!response.ok) process.exit(1) }).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    volumes:
      - backend-data:/app/data
      - backend-uploads:/app/uploads

  frontend:
    build:
      context: .
      dockerfile: deploy/frontend.Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    depends_on:
      backend:
        condition: service_healthy
    init: true
    ports:
      - "${FRONTEND_PORT:-80}:80"
    restart: unless-stopped
    stop_grace_period: 10s
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  backend-data:
  backend-uploads:
