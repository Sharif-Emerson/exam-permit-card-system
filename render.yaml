services:
  - type: web
    name: exam-permit-backend
    runtime: node
    rootDir: examples/rest-backend
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 24
      - key: APP_DB_PATH
        value: /var/data/production.sqlite
      - key: APP_UPLOADS_DIR
        value: /var/data/uploads
      - key: SESSION_TTL_HOURS
        value: 12
      - key: BOOTSTRAP_ADMIN_NAME
        value: System Administrator
      - key: BOOTSTRAP_ADMIN_SCOPE
        value: super-admin
      - key: BOOTSTRAP_ADMIN_EMAIL
        sync: false
      - key: BOOTSTRAP_ADMIN_PASSWORD
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
    disk:
      name: backend-data
      mountPath: /var/data
      sizeGB: 1